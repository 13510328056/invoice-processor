# ──────────────────────────────────────────────
# 发票识别 Web 服务配置
# ──────────────────────────────────────────────
# 此文件控制 Web 层行为，独立于 config.yaml（OCR/提取参数）。
# 支持通过环境变量 INVOICE_WEB_* 覆盖（如 INVOICE_WEB_PORT=9000）。

web:
  # ── 服务监听 ──
  host: "0.0.0.0"
  port: 8000

  # ── 上传限制 ──
  max_upload_size_mb: 100
  allowed_extensions:
    - ".ofd"
    - ".pdf"
    - ".jpg"
    - ".jpeg"
    - ".png"

  # ── 请求超时 ──
  request_timeout: 120

  # ── CORS ──
  cors_origins:
    - "*"

  # ── 处理选项 ──
  enable_dedup: true
  pre_warm_ocr: true                # 启动时预加载 PaddleOCR（首次请求更快，但启动慢）

  # ── 临时文件 ──
  temp_dir: ""                      # 空 = 系统临时目录
  cleanup_stale_temp_hours: 1

  # ── 日志 ──
  log_level: "INFO"
