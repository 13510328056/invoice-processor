services:
  invoice-processor-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice-processor
    ports:
      - "8000:8000"
    volumes:
      # 挂载配置（方便运行时修改）
      - ./config.yaml:/app/config.yaml:ro
      - ./web_config.yaml:/app/web_config.yaml:ro
      # 持久化临时数据
      - invoice_temp:/tmp/invoice_processor_web
    environment:
      # 环境变量覆盖 web_config.yaml（可选）
      - INVOICE_WEB_HOST=0.0.0.0
      - INVOICE_WEB_PORT=8000
      - INVOICE_WEB_MAX_UPLOAD_SIZE_MB=100
      - INVOICE_WEB_PRE_WARM_OCR=true
      - INVOICE_WEB_LOG_LEVEL=INFO
    restart: unless-stopped
    # 单 worker 模式：PaddleOCR 每个进程 ~1-2GB 内存
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 2g

volumes:
  invoice_temp:
